<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pulse</title>
  <script>
    // GitHub Pages SPA redirect: store the path and let index.html handle routing
    var path = window.location.pathname.replace('/arrow-gym-app', '') + window.location.search;
    sessionStorage.setItem('spa-redirect', path);
    window.location.replace('/arrow-gym-app/');
  </script>
</head>
<body></body>
</html>

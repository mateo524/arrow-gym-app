<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:24px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .stat{text-align:left}
  .stat b{display:block;font-size:22px;font-weight:900;color:#6df2a4;line-height:1.1;font-variant-numeric:tabular-nums}
  .stat span{font-size:10px;color:#8ea0a0;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .big{font-size:56px;font-weight:900;color:#6df2a4;font-variant-numeric:tabular-nums;letter-spacing:-2px;line-height:1}
  .sep{width:1px;align-self:stretch;background:#213033;margin:0 4px}
</style></head><body>
  <div class="stat"><b>128</b><span>entrenos</span></div>
  <div class="stat"><b>1.4k</b><span>series</span></div>
  <div class="stat"><b>🔥12</b><span>días seguidos</span></div>
  <div class="stat"><b>+2.5</b><span>kg pr</span></div>
  <div class="sep"></div>
  <div class="big">1:30</div>
  <p style="flex-basis:100%;font-size:12px;color:#8ea0a0;margin-top:4px">Stat numbers: 22px/900 green · tabular-nums. Rest-timer readout: 56px/900, −2px tracking.</p>
</body></html>

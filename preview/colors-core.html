<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:22px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .sw{border:1px solid #213033;border-radius:16px;overflow:hidden}
  .chip{height:64px}
  .meta{padding:8px 10px;background:rgba(13,18,20,.6)}
  .name{font-size:12px;font-weight:800;letter-spacing:.02em}
  .hex{font-size:11px;color:#8ea0a0;font-weight:600;font-variant-numeric:tabular-nums;text-transform:uppercase}
  .role{font-size:10px;color:#8ea0a0;margin-top:1px}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#050709;border-bottom:1px solid #213033"></div><div class="meta"><div class="name">bg</div><div class="hex">#050709</div><div class="role">app background</div></div></div>
  <div class="sw"><div class="chip" style="background:#0d1214"></div><div class="meta"><div class="name">panel</div><div class="hex">#0d1214</div><div class="role">card surface</div></div></div>
  <div class="sw"><div class="chip" style="background:#11191b"></div><div class="meta"><div class="name">panel2</div><div class="hex">#11191b</div><div class="role">raised panel</div></div></div>
  <div class="sw"><div class="chip" style="background:#213033"></div><div class="meta"><div class="name">line</div><div class="hex">#213033</div><div class="role">hairline border</div></div></div>
  <div class="sw"><div class="chip" style="background:#f4fff8"></div><div class="meta"><div class="name">text</div><div class="hex">#f4fff8</div><div class="role">primary text</div></div></div>
  <div class="sw"><div class="chip" style="background:#8ea0a0"></div><div class="meta"><div class="name">muted</div><div class="hex">#8ea0a0</div><div class="role">labels / secondary</div></div></div>
</div>
</body></html>

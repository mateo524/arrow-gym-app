<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:24px}
  .row{display:flex;align-items:baseline;gap:14px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .row:last-child{border:0}
  .spec{font-size:10px;color:#8ea0a0;font-weight:600;width:120px;flex-shrink:0;font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#6df2a4;font-weight:800}
  h1{font-size:28px;line-height:1.1;font-weight:800}
  h2{font-size:17px;font-weight:800}
  p{font-size:15px;color:#c7d5d2;line-height:1.5}
  .sm{font-size:12px;color:#8ea0a0}
</style></head><body>
  <div class="row"><span class="spec">11 · 800 · .14em</span><span class="eyebrow">Arrow Gym</span></div>
  <div class="row"><span class="spec">28 / 1.1 · 800</span><h1>Entrená rápido</h1></div>
  <div class="row"><span class="spec">17 · 800</span><h2>Esta semana</h2></div>
  <div class="row"><span class="spec">15 / 1.5 · 400</span><p>Mapa muscular, radar por grupos y registro sin fricción.</p></div>
  <div class="row"><span class="spec">12 · 400</span><span class="sm">último kg · 4 series · 25 min</span></div>
</body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:24px}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .bar{height:18px;background:#6df2a4;border-radius:4px}
  .v{font-size:11px;color:#8ea0a0;width:74px;font-variant-numeric:tabular-nums}
</style></head><body>
  <div class="row"><span class="v">2 · sp-1</span><div class="bar" style="width:2px"></div></div>
  <div class="row"><span class="v">4 · sp-2</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="v">6 · sp-3</span><div class="bar" style="width:6px"></div></div>
  <div class="row"><span class="v">8 · sp-4</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="v">10 · sp-5</span><div class="bar" style="width:10px"></div></div>
  <div class="row"><span class="v">12 · sp-6</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="v">14 · sp-7</span><div class="bar" style="width:14px"></div></div>
  <div class="row"><span class="v">18 · sp-8</span><div class="bar" style="width:18px"></div></div>
  <p style="font-size:12px;color:#8ea0a0;margin-top:10px;line-height:1.5">Tight, even rhythm. Gaps cluster at 6–12px; 14/18px frame page padding. Layout is flex/grid with <b style="color:#6df2a4">gap</b>, never margins.</p>
</body></html>

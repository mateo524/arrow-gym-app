<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:22px}
  .lbl{font-size:10px;color:#8ea0a0;text-transform:uppercase;letter-spacing:.1em;font-weight:800;margin:0 0 8px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .gly{width:44px;height:44px;border-radius:12px;background:#0e1718;border:1px solid #27383a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .gly span{font-size:20px;line-height:1}
  .gly small{font-size:7px;color:#8ea0a0}
</style></head><body>
  <p class="lbl">Emoji — primary nav & type icons</p>
  <div class="row">
    <div class="gly"><span>⚡</span><small>Inicio</small></div>
    <div class="gly"><span>🧠</span><small>Coach</small></div>
    <div class="gly"><span>📈</span><small>Progreso</small></div>
    <div class="gly"><span>📋</span><small>Rutinas</small></div>
    <div class="gly"><span>🏆</span><small>Récords</small></div>
    <div class="gly"><span>💪</span><small>Push</small></div>
    <div class="gly"><span>🥊</span><small>Boxeo</small></div>
    <div class="gly"><span>🚴</span><small>Bici</small></div>
  </div>
  <p class="lbl">Unicode — UI affordances</p>
  <div class="row">
    <div class="gly"><span style="color:#6df2a4">→</span><small>coach</small></div>
    <div class="gly"><span>↑</span><small>up</small></div>
    <div class="gly"><span>↓</span><small>down</small></div>
    <div class="gly"><span>×</span><small>remove</small></div>
    <div class="gly"><span>+</span><small>add</small></div>
    <div class="gly"><span>◈</span><small>mapa</small></div>
    <div class="gly"><span>⏱</span><small>timer</small></div>
    <div class="gly"><span>🔗</span><small>superset</small></div>
  </div>
</body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:24px}
  .row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .row:last-child{border:0}
  .w{font-size:24px}
  .spec{font-size:11px;color:#8ea0a0;width:150px;flex-shrink:0}
  b{color:#6df2a4}
</style></head><body>
  <div class="row"><span class="spec">400 · Regular</span><span class="w" style="font-weight:400">Inter Regular — body</span></div>
  <div class="row"><span class="spec">600 · Medium</span><span class="w" style="font-weight:600">Inter Medium — meta</span></div>
  <div class="row"><span class="spec">800 · <b>Bold (default)</b></span><span class="w" style="font-weight:800">Inter Bold — buttons & labels</span></div>
  <div class="row"><span class="spec">900 · Black</span><span class="w" style="font-weight:900">Inter Black — readouts</span></div>
  <p style="margin-top:14px;font-size:12px;color:#8ea0a0;line-height:1.5">Weight carries the hierarchy — there is no second family and no serif. 800 is the everyday weight; 900 is reserved for big numeric readouts.</p>
</body></html>

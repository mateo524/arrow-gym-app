<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:22px}
  .grid{display:flex;gap:12px;flex-wrap:wrap}
  .item{text-align:center}
  .box{width:78px;height:64px;background:#11191b;border:1px solid #2a3d3f;display:flex;align-items:center;justify-content:center;color:#6df2a4;font-weight:800;font-size:11px}
  .lbl{font-size:11px;font-weight:800;margin-top:6px}
  .role{font-size:9px;color:#8ea0a0}
</style></head><body>
<div class="grid">
  <div class="item"><div class="box" style="border-radius:999px">999</div><div class="lbl">chip</div><div class="role">pills · tags</div></div>
  <div class="item"><div class="box" style="border-radius:12px">12</div><div class="lbl">md</div><div class="role">inputs</div></div>
  <div class="item"><div class="box" style="border-radius:16px">16</div><div class="lbl">lg</div><div class="role">buttons</div></div>
  <div class="item"><div class="box" style="border-radius:20px">20</div><div class="lbl">xl</div><div class="role">cards</div></div>
  <div class="item"><div class="box" style="border-radius:24px">24</div><div class="lbl">2xl</div><div class="role">hero · sheet</div></div>
</div>
</body></html>

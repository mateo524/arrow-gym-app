<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:24px;display:flex;align-items:center;gap:24px}
  .tile{width:96px;height:96px;flex-shrink:0}
  .lock{display:flex;align-items:center;gap:12px}
  .mark{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#6df2a4,#75d9ff);color:#03100a;font-size:26px;font-weight:900;display:flex;align-items:center;justify-content:center}
  .word{font-size:24px;font-weight:900;letter-spacing:-.5px}
  .word span{color:#6df2a4}
  .cap{font-size:11px;color:#8ea0a0;margin-top:8px;line-height:1.5}
</style></head><body>
  <img class="tile" src="../assets/arrow-gym-icon.svg" alt="Arrow Gym icon">
  <div>
    <div class="lock"><div class="mark">→</div><div class="word">Arrow<span>Gym</span></div></div>
    <div class="cap">App tile (left): upward chevron "A" + bar, mint-green on near-black, radius&nbsp;110/512.<br>In-app coach mark: "→" in a green→cyan square.</div>
  </div>
</body></html>

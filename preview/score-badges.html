<!-- @dsCard group="Components" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:22px}
  .scores{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
  .badge{background:#080d0f;border:1px solid #223234;border-radius:14px;padding:9px 4px;text-align:center}
  .badge b{display:block;font-size:20px;font-weight:900;line-height:1.2}
  .badge span{display:block;font-size:8px;color:#8ea0a0;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stats div{background:rgba(13,18,20,.92);border:1px solid #213033;border-radius:14px;padding:12px;text-align:center}
  .stats b{display:block;font-size:22px;color:#6df2a4;font-weight:900;margin-bottom:2px}
  .stats span{font-size:11px;color:#8ea0a0}
</style></head><body>
  <div class="scores">
    <div class="badge" style="border-color:#6df2a4"><b style="color:#6df2a4">82</b><span>Muscle Gain</span></div>
    <div class="badge" style="border-color:#f59e0b"><b style="color:#f59e0b">54</b><span>Recuperación</span></div>
    <div class="badge" style="border-color:#75d9ff"><b style="color:#75d9ff">71</b><span>Cardio</span></div>
    <div class="badge" style="border-color:#ff6b6b"><b style="color:#ff6b6b">38</b><span>Balance</span></div>
  </div>
  <div class="stats">
    <div><b>128</b><span>entrenos</span></div>
    <div><b>1.4k</b><span>series</span></div>
    <div><b>🔥12</b><span>días seguidos</span></div>
  </div>
</body></html>

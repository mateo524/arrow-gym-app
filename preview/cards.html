<!-- @dsCard group="Components" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:22px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hero{padding:18px;border:1px solid #213033;border-radius:24px;background:linear-gradient(135deg,#111b1a,#07100d)}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#6df2a4;font-weight:800;margin-bottom:6px}
  .hero h1{font-size:22px;line-height:1.1;font-weight:800;margin-bottom:8px}
  .hero p{font-size:13px;color:#c7d5d2;line-height:1.45}
  .card{background:rgba(13,18,20,.92);border:1px solid #213033;border-radius:20px;padding:14px}
  .card h2{font-size:15px;font-weight:800;margin-bottom:6px}
  .card p{font-size:12px;color:#c7d5d2}
  .routine{background:linear-gradient(135deg,#14201f,#0b0f11);border:1px solid #2b3d3d;border-radius:20px;padding:14px}
  .routine span{font-size:10px;color:#6df2a4;letter-spacing:.13em;text-transform:uppercase;font-weight:800}
  .routine b{font-size:20px;display:block;margin:6px 0 2px}
  .routine small{font-size:11px;color:#8ea0a0}
</style></head><body>
  <div class="hero" style="grid-column:1/-1"><div class="eyebrow">Arrow Gym</div><h1>Entrená rápido. Medí cada músculo.</h1><p>Mapa muscular, radar por grupos y registro sin fricción.</p></div>
  <div class="card"><h2>Esta semana</h2><p>4 días · 6 fuerza · 2 cardio</p></div>
  <div class="routine"><span>💪</span><b>Push</b><small>6 ejercicios</small></div>
</body></html>

<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:22px}
  .blk{border-radius:16px;padding:12px;margin-bottom:8px;border:1px solid #243638;background:#091011}
  .blk span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.13em;font-weight:900;margin-bottom:4px}
  .blk p{margin:0;font-size:13px;line-height:1.45}
  .status{border-color:#2d7650;background:#0a1d13}.status span{color:#6df2a4}.status p{color:#c7e8e0}
  .warn{border-color:#6e4b17;background:#1a1207}.warn span,.warn p{color:#ffd187}
  .rec{border-color:#25518a;background:#081525}.rec span,.rec p{color:#9dc8ff}
  .prs{border-color:#6d4f17;background:linear-gradient(135deg,#1a1507,#0f0d06)}.prs span{color:#f5c542}.prs p{color:#ffe499;font-weight:700}
</style></head><body>
  <div class="blk status"><span>Resumen</span><p>Buena semana: +8% de volumen y consistencia alta. Cuidá el hombro derecho.</p></div>
  <div class="blk warn"><span>💤 Descarga recomendada</span><p>3 semanas de carga alta sin deload.</p></div>
  <div class="blk rec"><span>Próximas acciones</span><p>→ Subí 2.5 kg en Lat Pulldown.</p></div>
  <div class="blk prs"><span>🏆 Récords (2)</span><p>Squat 100 kg · Bench 80 kg</p></div>
</body></html>

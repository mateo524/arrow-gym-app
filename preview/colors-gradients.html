<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:22px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .g{height:74px;border-radius:18px;border:1px solid #213033;display:flex;align-items:flex-end;padding:10px}
  .t{font-size:11px;font-weight:800;color:#eafff2}.t small{display:block;font-weight:600;color:rgba(255,255,255,.6);font-size:9px}
</style></head><body>
<div class="grid">
  <div class="g" style="background:linear-gradient(135deg,#111b1a,#07100d)"><div class="t">hero / feature<small>135deg #111b1a → #07100d</small></div></div>
  <div class="g" style="background:linear-gradient(135deg,#6df2a4,#75d9ff)"><div class="t" style="color:#03100a">brand mark<small style="color:rgba(3,16,10,.6)">135deg green → cyan</small></div></div>
  <div class="g" style="background:linear-gradient(90deg,#6df2a4,#75d9ff)"><div class="t" style="color:#03100a">finish action<small style="color:rgba(3,16,10,.6)">90deg green → cyan</small></div></div>
  <div class="g" style="background:linear-gradient(135deg,#10202a,#0a0f13)"><div class="t" style="color:#75d9ff">cardio card<small>135deg #10202a → #0a0f13</small></div></div>
</div>
</body></html>

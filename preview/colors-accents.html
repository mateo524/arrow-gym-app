<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{font-family:Inter,system-ui,sans-serif;background:#050709;color:#f4fff8;padding:22px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .sw{border:1px solid #213033;border-radius:16px;overflow:hidden}
  .chip{height:64px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#03100a}
  .meta{padding:8px 10px;background:rgba(13,18,20,.6)}
  .name{font-size:12px;font-weight:800}
  .hex{font-size:11px;color:#8ea0a0;font-weight:600;text-transform:uppercase}
  .role{font-size:10px;color:#8ea0a0;margin-top:1px}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#6df2a4">PRIMARY</div><div class="meta"><div class="name">green</div><div class="hex">#6df2a4</div><div class="role">actions · brand · "good"</div></div></div>
  <div class="sw"><div class="chip" style="background:#75d9ff">SECONDARY</div><div class="meta"><div class="name">cyan</div><div class="hex">#75d9ff</div><div class="role">data · links · cardio</div></div></div>
  <div class="sw"><div class="chip" style="background:#e8f777">Aa</div><div class="meta"><div class="name">yellow</div><div class="hex">#e8f777</div><div class="role">highlight</div></div></div>
  <div class="sw"><div class="chip" style="background:#f59e0b">Aa</div><div class="meta"><div class="name">orange</div><div class="hex">#f59e0b</div><div class="role">warnings</div></div></div>
  <div class="sw"><div class="chip" style="background:#ff6b6b">Aa</div><div class="meta"><div class="name">danger</div><div class="hex">#ff6b6b</div><div class="role">errors · destructive</div></div></div>
  <div class="sw"><div class="chip" style="background:#a855f7;color:#fff">Aa</div><div class="meta"><div class="name">purple</div><div class="hex">#a855f7</div><div class="role">extra chart series</div></div></div>
</div>
</body></html>
